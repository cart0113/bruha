<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#ede8e1" rx="0"/>

  <!-- Cauldron icon (centered, scaled up) -->
  <g transform="translate(400, 140) scale(3.2)">
    <!-- Handle left -->
    <path d="M14 32c-5 0-7 3-7 6s3 6 7 6" stroke="#4a6591" stroke-width="3" fill="none" stroke-linecap="round"/>
    <!-- Handle right -->
    <path d="M50 32c5 0 7 3 7 6s-3 6-7 6" stroke="#4a6591" stroke-width="3" fill="none" stroke-linecap="round"/>
    <!-- Cauldron body -->
    <path d="M10 32c1 18 10 26 22 26s21-8 22-26H10z" fill="#2d3a4a"/>
    <!-- Liquid fill -->
    <ellipse cx="32" cy="40" rx="17" ry="8" fill="#6b5b95" opacity="0.35"/>
    <!-- Cauldron rim -->
    <rect x="8" y="28" width="48" height="7" rx="3.5" fill="#4a6591"/>
    <!-- Rim shine -->
    <rect x="14" y="29.5" width="36" height="3" rx="1.5" fill="#6d90c0" opacity="0.45"/>
    <!-- Big bubble -->
    <circle cx="35" cy="12" r="7.5" fill="#5ba0d9" opacity="0.7"/>
    <circle cx="33" cy="10" r="2.5" fill="#fff" opacity="0.35"/>
    <!-- Medium bubble -->
    <circle cx="21" cy="17" r="5.5" fill="#7bc8f0" opacity="0.6"/>
    <circle cx="19.5" cy="15.5" r="1.8" fill="#fff" opacity="0.3"/>
    <!-- Small bubble -->
    <circle cx="28" cy="4" r="3.5" fill="#a8ddf5" opacity="0.55"/>
    <circle cx="27" cy="3" r="1" fill="#fff" opacity="0.3"/>
    <!-- Tiny bubble -->
    <circle cx="42" cy="20" r="2.5" fill="#90c8e8" opacity="0.5"/>
    <!-- Star large -->
    <path d="M50 7l2-4.5 2 4.5 4.5 2-4.5 2-2 4.5-2-4.5-4.5-2z" fill="#f0c040" opacity="0.9"/>
    <!-- Star medium -->
    <path d="M13 6l1.3-2.8 1.3 2.8 2.8 1.3-2.8 1.3-1.3 2.8-1.3-2.8-2.8-1.3z" fill="#e89840" opacity="0.8"/>
    <!-- Star small -->
    <path d="M45 1l.8-1.8.8 1.8 1.8.8-1.8.8-.8 1.8-.8-1.8-1.8-.8z" fill="#f5d870" opacity="0.7"/>
    <!-- Cauldron feet -->
    <ellipse cx="20" cy="57" rx="3" ry="1.5" fill="#2d3a4a"/>
    <ellipse cx="44" cy="57" rx="3" ry="1.5" fill="#2d3a4a"/>
  </g>

  <!-- Title text -->
  <text x="600" y="480" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-weight="700" font-size="96" fill="#2d3a4a">bruha</text>

  <!-- Subtitle text -->
  <text x="600" y="545" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-weight="400" font-size="36" fill="#6b7b8d">a docsify extension</text>
</svg>
